name: Deploy MedSense HMI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show runner info
        run: |
          whoami
          hostname
          pwd

      - name: Sync files to deploy directory
        run: |
          mkdir -p /srv/stacks/MedSense_Docker_App_EE
          rsync -rltv --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'data' \
            ./ /srv/stacks/MedSense_Docker_App_EE/

      - name: Rebuild and restart app
        run: |
          cd /srv/stacks/MedSense_Docker_App_EE
          docker compose up --build -d