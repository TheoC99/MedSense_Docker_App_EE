services:
  hmi-app:
    build: .
    container_name: medsense-hmi
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - hmi_data:/app/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: medsense-cloudflared
    restart: unless-stopped
    depends_on:
      - hmi-app
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    profiles:
      - cloudflare

volumes:
  hmi_data:
